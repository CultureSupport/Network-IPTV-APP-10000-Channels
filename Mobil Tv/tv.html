<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro IPTV Android 16 Console</title>
    <!-- Video.js Base -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-bg: #0a0a0c;
            --accent-blue: #3b82f6;
            --android-green: #3DDC84;
        }

        body {
            background-color: var(--primary-bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Device Frame */
        .frame-container {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            margin: auto;
        }

        /* Mobile Frame Only */
        .frame-mobile {
            width: 320px;
            height: 640px;
            border: 12px solid #222;
            border-radius: 40px;
            padding: 10px;
            background: #000;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* VideoJS Customization */
        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        .vjs-big-play-button {
            background-color: var(--android-green) !important;
            border-radius: 50% !important;
            width: 80px !important;
            height: 80px !important;
            line-height: 80px !important;
            margin-top: -40px !important;
            margin-left: -40px !important;
        }

        .channel-card:hover {
            transform: scale(1.02);
            border-color: var(--accent-blue);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-6">
        
        <!-- Left: Player Section -->
        <div class="flex-1 flex flex-col items-center">
            <div class="mb-4">
                <h2 class="text-xl font-bold text-white flex items-center gap-2">
                    <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                    Android 16 Pro Mobile Player
                </h2>
            </div>

            <div id="player-wrapper" class="frame-container frame-mobile overflow-hidden">
                <video id="iptv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto">
                    <p class="vjs-no-js">To view this video please enable JavaScript.</p>
                </video>
            </div>

            <div id="status-box" class="mt-6 p-4 bg-gray-900 rounded-lg w-full max-w-lg text-sm">
                <h3 class="text-blue-400 font-bold mb-2">Streaming Logic (Core Instance)</h3>
                <p id="channel-title">Select a channel to begin...</p>
                <div id="psych-tag" class="mt-2 text-gray-500 italic">Feeling: Neutral</div>
            </div>
        </div>

        <!-- Right: Channel List -->
        <div class="w-full lg:w-96 flex flex-col h-[800px]">
            <div class="bg-gray-900 p-4 rounded-t-xl border-b border-gray-800">
                <input type="text" id="search-bar" placeholder="Search 10,000+ channels..." class="w-full bg-black border border-gray-700 rounded-md px-4 py-2 text-white focus:outline-none focus:border-blue-500">
                <div class="mt-2 flex justify-between text-xs text-gray-400">
                    <span id="channel-count">Loading channels...</span>
                    <span>Task 365 Verified</span>
                </div>
            </div>
            
            <div id="channel-list" class="flex-1 bg-gray-900 rounded-b-xl overflow-y-auto p-2 space-y-2">
                <!-- Channels injected here -->
            </div>
        </div>
    </div>

    <script>
        const PLAYER_ID = 'iptv-player';
        let player;
        let allChannels = [];

        // Initialize Player
        window.onload = function() {
            player = videojs(PLAYER_ID, {
                fluid: false,
                autoplay: false,
                liveui: true,
                responsive: true
            });
            
            fetchChannels();
        };

        // Fetch Logic for GitHub.io Data
        async function fetchChannels() {
            try {
                const response = await fetch('https://iptv-org.github.io/iptv/index.m3u');
                const data = await response.text();
                parseM3U(data);
            } catch (e) {
                console.error("Fetch failed", e);
                document.getElementById('channel-count').innerText = "Fetch Error (Check CORS)";
            }
        }

        // Parsing M3U to Logic-Object
        function parseM3U(content) {
            const lines = content.split('\n');
            let currentChannel = {};
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('#EXTINF')) {
                    const nameMatch = line.match(/,(.*)$/);
                    const countryMatch = line.match(/tvg-country="([^"]+)"/);
                    const categoryMatch = line.match(/group-title="([^"]+)"/);
                    
                    currentChannel = {
                        name: nameMatch ? nameMatch[1] : 'Unknown',
                        country: countryMatch ? countryMatch[1] : 'Global',
                        category: categoryMatch ? categoryMatch[1] : 'General',
                        psychTag: assignPsychTag(categoryMatch ? categoryMatch[1] : '')
                    };
                } else if (line.startsWith('http')) {
                    currentChannel.url = line;
                    allChannels.push(currentChannel);
                    if (allChannels.length >= 10000) break;
                }
            }
            renderChannels(allChannels);
            document.getElementById('channel-count').innerText = `${allChannels.length} Channels Found`;
        }

        function assignPsychTag(cat) {
            const low = cat.toLowerCase();
            if (low.includes('news')) return 'Logic: Fact-Checking';
            if (low.includes('music')) return 'Feeling: Relaxed';
            if (low.includes('sport')) return 'Feeling: Excitement';
            if (low.includes('documentary')) return 'Logic: Analytical';
            return 'Feeling: Neutral';
        }

        function renderChannels(channels) {
            const container = document.getElementById('channel-list');
            container.innerHTML = '';
            
            channels.slice(0, 500).forEach((ch) => {
                const div = document.createElement('div');
                div.className = "channel-card p-3 bg-black border border-gray-800 rounded-lg cursor-pointer transition flex items-center gap-3";
                div.onclick = () => playChannel(ch);
                
                div.innerHTML = `
                    <div class="w-8 h-8 bg-gray-800 rounded flex items-center justify-center text-[10px] font-bold">
                        ${ch.country.toUpperCase()}
                    </div>
                    <div class="flex-1">
                        <div class="text-sm font-medium truncate">${ch.name}</div>
                        <div class="text-[10px] text-gray-500 uppercase">${ch.category}</div>
                    </div>
                    <div class="text-[10px] text-blue-500">${ch.psychTag.split(':')[0]}</div>
                `;
                container.appendChild(div);
            });
        }

        function playChannel(ch) {
            player.src({ type: 'application/x-mpegURL', src: ch.url });
            player.play();
            document.getElementById('channel-title').innerText = `Streaming: ${ch.name}`;
            document.getElementById('psych-tag').innerText = ch.psychTag;
        }

        // Search logic
        document.getElementById('search-bar').oninput = function(e) {
            const term = e.target.value.toLowerCase();
            const filtered = allChannels.filter(c => c.name.toLowerCase().includes(term));
            renderChannels(filtered);
        };
    </script>
</body>
</html>
